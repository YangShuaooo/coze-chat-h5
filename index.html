<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coze AI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-app {
            width: 100%;
            max-width: 600px;
            min-height: 80vh;
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background-color: #ffffff;
            color: #2A2A37;
            padding: 16px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header h1 {
            font-size: 16px;
            font-weight: 800;
        }
        
        .model-selector {
            background-color: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 16px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0px 4px 50px 0px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: all 0.2s ease;
            height: 36px;
        }

        .model-selector:hover {
            border-color: #007AFF;
        }

        .model-selector:active,
        .model-selector.active {
            background-color: #007AFF;
            border-color: #007AFF;
            color: #ffffff;
        }
        
        .model-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-body {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
        }
        
        .chat-body::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(0, 0, 0, 0.02) 100%);
            pointer-events: none;
        }
        
        .message {
            max-width: 80%;
            padding: 16px 16px;
            border-radius: 16px;
            line-height: 1.4;
            font-weight: 400;
        }
        
        .message p {
            margin: 0;
        }
        
        .user-message {
            align-self: flex-end;
            background-color: transparent;
            border-bottom-right-radius: 4px;
        }
        
        .ai-message {
            align-self: flex-start;
            background-color: rgba(227, 242, 253, 0.8);
            border: 1px solid rgba(187, 222, 251, 0.8);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            line-height: 1.6;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.08);
            padding: 16px 16px;
        }

        .ai-message h1, .ai-message h2, .ai-message h3 {
            margin: 0 0 0px 0;
            line-height: 1.3;
        }

        .ai-message p {
            margin: 0 0 0px 0;
        }

        .ai-message.loading {
            border: none;
        }
        
        .suggestions {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .suggestion-card {
            background-color: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 16px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.04);
        }
        
        .suggestion-card:hover {
            background-color: #f9f9f9;
            border-color: #d4d4d4;
        }
        
        .chat-footer {
            border-top: 1px solid #e5e5e5;
            padding: 16px 16px;
            background-color: white;
        }
        
        .input-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        textarea {
            flex: 1;
            border: 1px solid #e0e0e0;
            border-radius: 18px;
            padding: 8px 16px;
            resize: none;
            min-height: 32px;
            max-height: 100px;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.4;
            overflow-y: auto;
        }
        
        textarea:focus {
            outline: none;
            border-color: #007AFF;
        }
        
        .send-button {
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease;
            flex-shrink: 0;
        }
        
        .send-button:hover {
            background-color: #0056b3;
        }
        
        .send-button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        
        .loading {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #666;
            padding: 16px 16px;
            background-color: rgba(227, 242, 253, 0.8);
            border-radius: 16px;
            border: 1px solid rgba(187, 222, 251, 0.8);
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.08);
        }
        
        .loading-text {
            font-weight: 500;
        }
        
        .loading-dots {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        
        .loading-dot {
            width: 8px;
            height: 8px;
            background-color: #2196f3;
            border-radius: 50%;
            animation: pulse 1.2s infinite ease-in-out;
        }
        
        .loading-dot:nth-child(1) {
            animation-delay: 0s;
        }
        
        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.6);
            }
        }
        
        .error-message {
            color: #f44336;
            padding: 12px;
            background-color: #ffebee;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 14px;
        }
        
        /* Markdown样式 */
        .markdown-content h1, .markdown-content h2, .markdown-content h3, .markdown-content h4 {
            margin-top: 0.5em;
            margin-bottom: 0.25em;
            font-weight: bold;
        }
        
        .markdown-content h1 { font-size: 1.5em; }
        .markdown-content h2 { font-size: 1.3em; }
        .markdown-content h3 { font-size: 1.2em; }
        .markdown-content h4 { font-size: 1.1em; }
        
        .markdown-content p { margin: 0.25em 0; }
        .markdown-content ul, .markdown-content ol { margin-left: 1.5em; margin-bottom: 0.25em; margin-top: 0.25em; }
        .markdown-content li { margin: 0.1em 0; line-height: 1.4; }
        .markdown-content strong, .markdown-content b { font-weight: bold; }
        .markdown-content em, .markdown-content i { font-style: italic; }
        .markdown-content code { 
            background-color: #e8e8e8; 
            padding: 0.1em 0.3em; 
            border-radius: 3px; 
            font-family: monospace; 
        }
        .markdown-content pre { 
            background-color: #e8e8e8; 
            padding: 1em; 
            border-radius: 4px; 
            overflow-x: auto; 
            margin: 0.5em 0; 
        }
        .markdown-content blockquote { 
            border-left: 4px solid #ddd; 
            padding-left: 1em; 
            margin: 0.5em 0; 
            color: #666; 
        }
        
        /* 响应式设计 */
        @media (max-width: 600px) {
            .chat-app {
                max-width: 100%;
                min-height: 100vh;
                border-radius: 0;
            }
            
            .chat-body {
                padding: 16px;
            }
            
            .chat-footer {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-app">
        <div class="chat-header">
            <h1>AIPM面试小助手</h1>
            <button class="model-selector" id="clear-btn" onmousedown="clearBtnDown()" onmouseup="clearBtnUp(); clearChat();" onmouseleave="clearBtnUp()" ontouchstart="clearBtnDown()" ontouchend="clearBtnUp(); clearChat();">
                清空对话
            </button>
        </div>
        
        <div class="chat-body" id="chat-body">
            <div class="ai-message">
                <p>你好！我是AIPM面试小助手。请问有什么我可以帮助你的吗？</p>
            </div>
            
            <div class="suggestions" id="suggestions-container">
                <div class="suggestion-card" id="random-question" onclick="selectSuggestion(this.dataset.question)"></div>
                <div class="suggestion-card" onclick="selectSuggestion('开始面试')">开始面试</div>
            </div>
        </div>
        
        <div class="chat-footer">
            <div class="input-container">
                <textarea id="message" placeholder="请输入您的问题..." oninput="autoResize(this)"></textarea>
                <button class="send-button" onclick="callCozeAPI()" id="send-button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // 清空对话按钮按下时的效果
        function clearBtnDown() {
            const clearBtn = document.getElementById('clear-btn');
            clearBtn.classList.add('active');
        }
        
        // 清空对话按钮松开时的效果
        function clearBtnUp() {
            const clearBtn = document.getElementById('clear-btn');
            clearBtn.classList.remove('active');
        }
        
        // AI产品经理面试问题库
        const interviewQuestions = [
            '什么是RAG技术？',
            '如何评估大语言模型的性能？',
            'Prompt Engineering有哪些技巧？',
            'AI产品如何进行需求分析？',
            '什么是Agent智能体？',
            '如何设计AI对话产品的用户体验？',
            '大模型微调(Fine-tuning)的原理是什么？',
            'AI产品如何处理用户隐私问题？',
            '什么是向量数据库？',
            '如何降低大模型幻觉问题？',
            'AI产品的商业模式有哪些？',
            '如何进行AI产品的竞品分析？',
            '什么是多模态AI？',
            'AI产品如何进行A/B测试？',
            '大模型的成本优化策略有哪些？'
        ];

        // 获取随机问题
        function getRandomQuestion() {
            const randomIndex = Math.floor(Math.random() * interviewQuestions.length);
            return interviewQuestions[randomIndex];
        }

        // 初始化建议卡片
        function initSuggestions() {
            const randomQuestion = getRandomQuestion();
            const randomQuestionCard = document.getElementById('random-question');
            if (randomQuestionCard) {
                randomQuestionCard.textContent = randomQuestion;
                randomQuestionCard.dataset.question = randomQuestion;
            }
        }

        // 清空对话
        function clearChat() {
            const chatBody = document.getElementById('chat-body');
            const randomQuestion = getRandomQuestion();
            chatBody.innerHTML = `
                <div class="ai-message">
                    <p>你好！我是AIPM面试小助手。请问有什么我可以帮助你的吗？</p>
                </div>
                <div class="suggestions" id="suggestions-container">
                    <div class="suggestion-card" id="random-question" onclick="selectSuggestion(this.dataset.question)" data-question="${randomQuestion}">${randomQuestion}</div>
                    <div class="suggestion-card" onclick="selectSuggestion('开始面试')">开始面试</div>
                </div>
            `;
        }
        
        // 自动调整文本框高度
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }
        
        // 选择建议
        function selectSuggestion(text) {
            hideSuggestions();
            const messageInput = document.getElementById('message');
            messageInput.value = text;
            autoResize(messageInput);
            callCozeAPI();
        }
        
        // 隐藏建议卡片
        function hideSuggestions() {
            const suggestions = document.querySelector('.suggestions');
            if (suggestions) {
                suggestions.style.display = 'none';
            }
        }

        // 打字机效果函数
        let currentText = '';
        async function typeWriterEffect(element, newText) {
            currentText += newText;
            // 直接追加文本内容，保持流式输出的流畅性
            element.innerHTML = parseMarkdown(currentText);
            // 滚动到底部
            const chatBody = document.getElementById('chat-body');
            chatBody.scrollTop = chatBody.scrollHeight;
            // 添加小延迟以产生打字机效果
            await new Promise(resolve => setTimeout(resolve, 30));
        }
        
        // 简单的Markdown解析函数
        function parseMarkdown(text) {
            if (!text) return '';
            
            let html = text
                // 转义HTML特殊字符
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                // 标题
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                // 粗体
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/__(.*?)__/g, '<strong>$1</strong>')
                // 斜体
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/_(.*?)_/g, '<em>$1</em>')
                // 行内代码
                .replace(/`(.*?)`/g, '<code>$1</code>')
                // 代码块
                .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
                // 无序列表
                .replace(/^- (.*$)/gim, '<li>$1</li>')
                // 处理列表容器
                .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
                // 换行
                .replace(/\n/g, '<br>');
            
            return html;
        }

        // Coze API 配置
        const API_URL = 'https://api.coze.cn/v1/workflows/chat';
        const API_KEY = 'pat_GdE6AyAy5ovoyBSjgy91yuncC3qjWA3Fwt7KgYzj7bBnYJQVc1r48JBqbdYdlvUm';
        const WORKFLOW_ID = '7627901214831362088';
        const APP_ID = '7627811392493764660';
        
        async function callCozeAPI() {
            const message = document.getElementById('message').value.trim();
            const chatBody = document.getElementById('chat-body');
            const sendButton = document.getElementById('send-button');
            
            if (!message) return;
            
            // 显示用户消息
            const userMessageDiv = document.createElement('div');
            userMessageDiv.className = 'user-message';
            userMessageDiv.innerHTML = `<p>${message}</p>`;
            chatBody.appendChild(userMessageDiv);
            hideSuggestions();
            
            // 显示加载状态
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'ai-message loading';
            loadingDiv.innerHTML = `
                <span class="loading-text">正在思考...</span>
                <div class="loading-dots">
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                </div>
            `;
            chatBody.appendChild(loadingDiv);
            
            // 清空输入框
            document.getElementById('message').value = '';
            autoResize(document.getElementById('message'));
            
            // 禁用发送按钮
            sendButton.disabled = true;
            
            // 滚动到底部
            chatBody.scrollTop = chatBody.scrollHeight;
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        workflow_id: WORKFLOW_ID,
                        app_id: APP_ID,
                        parameters: {
                            "CONVERSATION_NAME": "AIPM_EXERCISE",
                            "USER_INPUT": message
                        },
                        additional_messages: [{
                            content_type: 'text',
                            role: 'user',
                            type: 'question',
                            content: message
                        }]
                    })
                });
                
                if (!response.ok) {
                    try {
                        const errorData = await response.json();
                        throw new Error(`HTTP error! status: ${response.status}\n${JSON.stringify(errorData, null, 2)}`);
                    } catch (e) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                }
                
                // 检查是否是SSE流
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('text/event-stream')) {
                    // 处理SSE流
                    const reader = response.body.getReader();
                    let fullMessage = '';
                    let aiMessageDiv = null;
                    let messageContentDiv = null;
                    currentText = ''; // 重置打字机效果的文本
                    let hasStartedDisplaying = false;
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        const chunk = new TextDecoder().decode(value);
                        
                        // 解析SSE事件
                        const events = chunk.split('\n\n');
                        for (const event of events) {
                            if (!event) continue;
                            
                            const lines = event.split('\n');
                            let eventType = 'message';
                            let eventData = '';
                            
                            for (const line of lines) {
                                if (line.startsWith('event:')) {
                                    eventType = line.substring(6).trim();
                                } else if (line.startsWith('data:')) {
                                    eventData += line.substring(5).trim();
                                }
                            }
                            
                            if (eventData) {
                                try {
                                    const data = JSON.parse(eventData);
                                    
                                    // 实时收集并显示消息内容
                                    if (eventType === 'conversation.message.delta' && data.content) {
                                        if (!hasStartedDisplaying) {
                                            // 当收到第一个数据块时，移除加载状态并创建AI消息容器
                                            chatBody.removeChild(loadingDiv);
                                            aiMessageDiv = document.createElement('div');
                                            aiMessageDiv.className = 'ai-message';
                                            messageContentDiv = document.createElement('div');
                                            messageContentDiv.className = 'markdown-content';
                                            aiMessageDiv.appendChild(messageContentDiv);
                                            chatBody.appendChild(aiMessageDiv);
                                            hasStartedDisplaying = true;
                                        }
                                        fullMessage += data.content;
                                        // 使用打字机效果逐字显示
                                        await typeWriterEffect(messageContentDiv, data.content);
                                    }
                                    if (eventType === 'conversation.message.completed' && data.type === 'answer' && data.content) {
                                        if (!hasStartedDisplaying) {
                                            // 即使直接收到完成事件，也要先创建消息容器
                                            chatBody.removeChild(loadingDiv);
                                            aiMessageDiv = document.createElement('div');
                                            aiMessageDiv.className = 'ai-message';
                                            messageContentDiv = document.createElement('div');
                                            messageContentDiv.className = 'markdown-content';
                                            aiMessageDiv.appendChild(messageContentDiv);
                                            chatBody.appendChild(aiMessageDiv);
                                            hasStartedDisplaying = true;
                                        }
                                        fullMessage = data.content;
                                        messageContentDiv.innerHTML = parseMarkdown(fullMessage);
                                    }
                                } catch (e) {
                                    // 忽略解析错误
                                }
                            }
                        }
                    }
                    
                    // 如果没有收到任何内容，显示错误信息
                    if (!fullMessage) {
                        if (!hasStartedDisplaying) {
                            chatBody.removeChild(loadingDiv);
                        }
                        if (!aiMessageDiv) {
                            aiMessageDiv = document.createElement('div');
                            aiMessageDiv.className = 'ai-message';
                            messageContentDiv = document.createElement('div');
                            messageContentDiv.className = 'markdown-content';
                            aiMessageDiv.appendChild(messageContentDiv);
                            chatBody.appendChild(aiMessageDiv);
                        }
                        messageContentDiv.innerHTML = '<p>抱歉，我无法生成回答，请稍后再试。</p>';
                    }
                } else {
                    // 处理普通JSON响应
                    const responseData = await response.json();
                    
                    // 移除加载状态并创建AI消息容器
                    chatBody.removeChild(loadingDiv);
                    
                    const aiMessageDiv = document.createElement('div');
                    aiMessageDiv.className = 'ai-message';
                    aiMessageDiv.innerHTML = `<pre>${JSON.stringify(responseData, null, 2)}</pre>`;
                    chatBody.appendChild(aiMessageDiv);
                }
            } catch (error) {
                // 移除加载状态
                chatBody.removeChild(loadingDiv);
                
                // 显示错误信息
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.innerHTML = `<strong>错误:</strong> ${error.message}`;
                chatBody.appendChild(errorDiv);
            } finally {
                // 启用发送按钮
                sendButton.disabled = false;
                
                // 滚动到底部
                chatBody.scrollTop = chatBody.scrollHeight;
            }
        }

        // 页面加载时初始化建议卡片
        document.addEventListener('DOMContentLoaded', initSuggestions);
    </script>
</body>
</html>
